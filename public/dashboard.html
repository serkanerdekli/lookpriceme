<script>
    const storeSlug = "serkan-mobilya"; // İleride Login'den gelecek

    // 1. Ürünleri Firestore'dan Çek
    async function loadProducts() {
        try {
            const res = await fetch(`/api/v1/${storeSlug}/products/all`);
            const data = await res.json();
            
            if (data.success) {
                renderProducts(data.products);
            }
        } catch (err) {
            console.error("Yükleme hatası:", err);
        }
    }

    function renderProducts(products) {
        const list = document.getElementById('productList');
        if (products.length === 0) {
            list.innerHTML = "<p class='text-gray-400'>Henüz ürün eklenmemiş.</p>";
            return;
        }
        list.innerHTML = products.map(p => `
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                <p class="text-emerald-600 font-bold text-lg my-2">${p.price} TL</p>
                <p class="text-gray-400 text-xs">Marker: ${p.markerId}</p>
                <div class="mt-4 flex gap-2">
                    <button class="text-sm bg-gray-100 px-3 py-1 rounded">Düzenle</button>
                    <button class="text-sm text-red-500 bg-red-50 px-3 py-1 rounded">Sil</button>
                </div>
            </div>
        `).join('');
    }

    // 2. Yeni Ürün Ekleme (Prompt ile hızlı test)
    async function openAddProductModal() {
        const name = prompt("Ürün Adı:");
        const price = prompt("Fiyat (TL):");
        const markerId = prompt("Marker ID (Örn: masa-002):");
        const description = prompt("Açıklama:");

        if (!name || !price || !markerId) return;

        const res = await fetch('/api/v1/products/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ storeSlug, name, price, markerId, description })
        });
        
        const data = await res.json();
        if (data.success) {
            alert("Ürün Eklendi!");
            loadProducts(); // Listeyi yenile
        }
    }

    // Sayfa açıldığında yükle
    loadProducts();
</script>
