<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>lookpriceme | Mağaza Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div class="w-64 bg-emerald-700 text-white p-6 hidden md:block">
        <h1 class="text-2xl font-bold mb-10">lookpriceme</h1>
        <nav class="space-y-4">
            <a href="#" class="block font-semibold bg-emerald-800 p-3 rounded">Ürünlerim</a>
            <button onclick="logout()" class="block font-semibold p-3 text-red-300 w-full text-left">Çıkış Yap</button>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-gray-800" id="storeTitle">Yükleniyor...</h2>
                <p class="text-gray-500" id="storeSlugText">...</p>
            </div>
            <button onclick="openAddProductModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700">Yeni Ürün Ekle</button>
        </header>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="productList">
            <p class="text-gray-500 italic">Ürünleriniz yükleniyor...</p>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Kendi bilgilerinle doldur!)
        const firebaseConfig = {
            apiKey: "AIzaSyAYgj2XmyxNhE3aI5eKYqEPNRmykDOr0E0",
            authDomain: "lookpriceme-6b258.firebaseapp.com",
            projectId: "lookpriceme-6b258",
            storageBucket: "lookpriceme-6b258.firebasestorage.app",
            messagingSenderId: "691008977276",
            appId: "1:691008977276:web:748cb9a559f0e0c6014cf9"
        };
        firebase.initializeApp(firebaseConfig);

        let currentStoreSlug = "";

// 1. AUTH KONTROLÜ (Daha Sabırlı Versiyon)
firebase.auth().onAuthStateChanged(async (user) => {
    if (user) {
        console.log("Kullanıcı doğrulandı:", user.email);
        await fetchStoreSlug(user.email);
    } else {
        console.log("Kullanıcı bulunamadı, login sayfasına gönderiliyor...");
        // Eğer giriş yapılmamışsa login'e gönder
        window.location.href = "/login.html";
    }
});

// 2. MAĞAZA BUL (Hata Kontrolü Eklenmiş)
async function fetchStoreSlug(email) {
    try {
        const res = await fetch(`/api/v1/get-store-by-owner/${email}`);
        if (res.status === 404) {
            alert("Dikkat: Bu e-posta ile eşleşen bir mağaza Firestore'da bulunamadı! (ownerEmail alanını kontrol edin)");
            return;
        }
        const data = await res.json();
        if (data.success) {
            currentStoreSlug = data.slug;
            document.getElementById('storeSlugText').innerText = currentStoreSlug;
            document.getElementById('storeTitle').innerText = currentStoreSlug.toUpperCase() + " Paneli";
            loadProducts();
        }
    } catch (err) { 
        console.error("Mağaza çekme hatası:", err);
    }
}
