<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>lookpriceme | Mağaza Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase JS SDK (Giriş kontrolü için) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- Sidebar (Sol Menü) -->
    <div class="w-64 bg-emerald-700 text-white p-6 hidden md:block">
        <h1 class="text-2xl font-bold mb-10">lookpriceme</h1>
        <nav class="space-y-4">
            <a href="#" class="block font-semibold bg-emerald-800 p-3 rounded">Ürünlerim</a>
            <a href="#" class="block font-semibold p-3 hover:bg-emerald-600 rounded">İstatistikler</a>
            <a href="#" class="block font-semibold p-3 hover:bg-emerald-600 rounded">Mağaza Ayarları</a>
            <button onclick="logout()" class="block font-semibold p-3 text-red-300 w-full text-left">Çıkış Yap</button>
        </nav>
    </div>

    <!-- Main Content (Ana Alan) -->
    <div class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold text-gray-800" id="storeTitle">Mağaza Paneli</h2>
            <button onclick="openAddProductModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700">Yeni Ürün Ekle</button>
        </header>

        <!-- Ürün Kartları Listesi -->
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="productList">
            <!-- Ürünler buraya JS ile dinamik gelecek -->
            <p class="text-gray-500 italic">Ürünleriniz yükleniyor...</p>
        </div>
    </div>

    <script>
        // İleride Firebase Auth buraya gelecek. Şimdilik arayüzü test ediyoruz.
        // Manuel bir test verisi:
        const demoProducts = [
            { name: "Zümrüt Puf", price: 3500, markerId: "puf-001" },
            { name: "Efes Masa", price: 50000, markerId: "masa-001" }
        ];

        function renderProducts(products) {
            const list = document.getElementById('productList');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                    <p class="text-emerald-600 font-bold text-lg my-2">${p.price} TL</p>
                    <p class="text-gray-400 text-xs">Kod: ${p.markerId}</p>
                    <div class="mt-4 flex gap-2">
                        <button class="text-sm bg-gray-100 px-3 py-1 rounded">Düzenle</button>
                        <button class="text-sm text-red-500 bg-red-50 px-3 py-1 rounded">Sil</button>
                    </div>
                </div>
            `).join('');
        }

        // Sayfa açıldığında render et
        setTimeout(() => renderProducts(demoProducts), 1000);

        function openAddProductModal() {
            alert("Yeni ürün ekleme formu yakında aktif!");
        }

        function logout() {
            window.location.href = "/login";
        }
    </script>
</body>
</html>
