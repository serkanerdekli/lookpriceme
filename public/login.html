<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lookpriceme | Mağaza Girişi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-emerald-600 to-blue-700 h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-emerald-600 mb-2">lookpriceme</h1>
        <p class="text-gray-500 text-center mb-8">Mağaza Yönetim Paneli</p>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" class="w-full p-4 border rounded-xl" placeholder="E-posta" required>
            <input type="password" id="password" class="w-full p-4 border rounded-xl" placeholder="Şifre" required>
            <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 transition shadow-lg">Giriş Yap</button>
        </form>
    </div>

    <script>
        // FIREBASE AYARLARIN (Firebase Console > Project Settings > General kısmından almalısın)
        const firebaseConfig = {
            apiKey: "AIzaSyAYgj2XmyxNhE3aI5eKYqEPNRmykDOr0E0",
            authDomain: "lookpriceme-6b258.firebaseapp.com",
            projectId: "lookpriceme-6b258",
            storageBucket: "lookpriceme-6b258.firebasestorage.app",
            messagingSenderId: "691008977276",
            appId: "1:691008977276:web:748cb9a559f0e0c6014cf9"
        };
        firebase.initializeApp(firebaseConfig);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                // Giriş başarılı, hemen fırlatıyoruz
                window.location.href = "/dashboard.html";
            } catch (error) {
                alert("Giriş Başarısız: " + error.message);
            }
        };
    </script>
</body>
</html>
