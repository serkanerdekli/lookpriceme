<!DOCTYPE html>
<html>
<head>
    <title>lookpriceme - AR View</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* Kamera Görüntüsü Paneli */
        #camera-stream {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* Bilgi Kartı Katmanı */
        #ar-ui {
            position: fixed; bottom: 50px; left: 0; width: 100%;
            z-index: 10; display: flex; justify-content: center;
            transition: all 0.5s ease;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* Arka planı bulanıklaştırır (Premium efekt) */
            color: #333; padding: 20px; border-radius: 25px;
            width: 85%; max-width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .price { font-size: 2.2rem; font-weight: 800; color: #10b981; margin: 10px 0; }
        .btn-action { 
            background: #2563eb; color: white; border: none; width: 100%;
            padding: 15px; border-radius: 15px; font-size: 1.1rem; font-weight: bold;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<!-- Kamera Görüntüsü -->
<video id="camera-stream" autoplay playsinline muted></video>

<!-- Yükleme Ekranı -->
<div id="loading-screen" class="loading-screen">
    <h2>lookpriceme</h2>
    <p>Kamera ve Ürün Hazırlanıyor...</p>
</div>

<!-- AR Arayüzü -->
<div id="ar-ui" style="display: none;">
    <div class="product-card">
        <h2 id="p-name" style="margin:0; font-size: 1.4rem;">Ürün Adı</h2>
        <p id="p-desc" style="color:#666; font-size: 0.9rem; margin: 10px 0;"></p>
        <div class="price" id="p-price">0 TL</div>
        <button class="btn-action" onclick="alert('Mağazaya bildirim gönderildi!')">Teklif Al / Satın Al</button>
        <div style="margin-top:15px; font-size: 0.7rem; color: #999; font-weight: bold; letter-spacing: 1px;" id="p-store">STORE</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const store = urlParams.get('s');
    const marker = urlParams.get('m');

    // 1. Kamerayı Başlat
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, // Arka kamerayı seçer
                audio: false 
            });
            document.getElementById('camera-stream').srcObject = stream;
        } catch (err) {
            alert("Kamera izni verilmedi veya cihazda kamera bulunamadı!");
        }
    }

    // 2. Veriyi Getir
    async function fetchData() {
        if (!store || !marker) return;

        try {
            const res = await fetch(`/api/v1/${store}/${marker}`);
            const data = await res.json();

            if (data.success) {
                document.getElementById('p-name').innerText = data.name;
                document.getElementById('p-desc').innerText = data.description || "Bu ürün hakkında detaylı bilgi için mağazaya ulaşın.";
                document.getElementById('p-price').innerText = data.price + " TL";
                document.getElementById('p-store').innerText = "lookpriceme - " + data.storeSlug.toUpperCase();
                
                // Her şey hazır, yükleme ekranını kaldır, UI'yı göster
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('ar-ui').style.display = 'flex';
            }
        } catch (err) {
            console.error(err);
        }
    }

    // Başlat
    initCamera();
    fetchData();
</script>

</body>
</html>
