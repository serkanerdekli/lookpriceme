<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- AR Kütüphaneleri -->
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        #ui-layer {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; display: none; width: 90%;
        }
        .info-card {
            background: white; padding: 20px; border-radius: 15px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- AR Sahnesi: Sistem 'targets.mind' dosyasındaki mobilya resimlerini arayacak -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 1. Mobilya (Efes Masası) Tanındığında Belirecek Görsel İşaret -->
        <a-entity id="target-0" mindar-image-target="targetIndex: 0">
            <!-- Masanın üzerinde yüzen mavi bir halka/buton -->
            <a-ring color="#2563eb" radius-inner="0.08" radius-outer="0.1" position="0 0 0" animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1000; loop: true"></a-ring>
        </a-entity>

    </a-scene>

    <!-- Bilgi Paneli (Başlangıçta Gizli) -->
    <div id="ui-layer">
        <div class="info-card">
            <h2 id="p-name">Mobilya Adı</h2>
            <p id="p-price">0 TL</p>
            <button onclick="location.reload()">Kapat</button>
        </div>
    </div>

    <script>
        // Sistem bir mobilyayı tanıdığında (targetFound)
        const targetEl = document.querySelector('#target-0');
        targetEl.addEventListener("targetFound", event => {
            console.log("Mobilya Tanındı!");
            // API'den Efes Masası verilerini çek ve UI'yı göster
            fetchProductData('serkan-mobilya', 'masa-001');
        });

        async function fetchProductData(store, marker) {
            const res = await fetch(`/api/v1/${store}/${marker}`);
            const data = await res.json();
            if(data.success) {
                document.getElementById('p-name').innerText = data.name;
                document.getElementById('p-price').innerText = data.price + " TL";
                document.getElementById('ui-layer').style.display = 'block';
            }
        }
    </script>
</body>
</html>
